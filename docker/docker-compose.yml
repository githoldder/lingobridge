services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=lingobridge
      - POSTGRES_USER=lingobridge
      - POSTGRES_PASSWORD=lingobridge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingobridge -d lingobridge"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - backend-storage:/app/backend/storage
      - backend-data:/app/backend/data
    environment:
      - HOST=0.0.0.0
      - PORT=3001
      - DATABASE_URL=postgres://lingobridge:lingobridge_dev@postgres:5432/lingobridge
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  backend-storage:
  backend-data:
