services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - backend-storage:/app/backend/storage
      - backend-data:/app/backend/data
    environment:
      - HOST=0.0.0.0
      - PORT=3001
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
  backend-data:
