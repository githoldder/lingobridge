name: CI Workflow

on:
  push:
    branches:
      - main
      - 'codex/*'
      - 'demo/*'
      - 'dev/*'
      - 'release/*'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Code Lint Check (TypeScript Compilation)
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Run Backend Integration & API Tests
        run: npm run backend:test
        env:
          DB_MODE: json
